<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>布吉街道义务教育录取分析</title>
  <script src="data/admission-data.js"></script>
  <style>
    :root {
      --bg: #f4f6f2;
      --panel: #ffffff;
      --panel-2: #eef3ef;
      --ink: #16221d;
      --muted: #61716a;
      --line: #d7dfd8;
      --green: #0f6f59;
      --green-2: #0a8b70;
      --blue: #2e6f9f;
      --amber: #c97919;
      --red: #b7483e;
      --shadow: 0 12px 28px rgba(23, 38, 31, .08);
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(15, 111, 89, .06), transparent 280px),
        var(--bg);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1680px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 30px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 6px 0 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.05;
      font-family: "Microsoft JhengHei UI", "Microsoft YaHei UI", sans-serif;
      font-weight: 800;
    }

    .brand p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .72);
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.1fr .9fr .9fr .9fr 1.5fr;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .8);
      box-shadow: var(--shadow);
    }

    .segmented {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      min-width: 0;
    }

    .segmented button {
      height: 34px;
      padding: 0 10px;
      border-radius: 4px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
    }

    .segmented button.active {
      color: #fff;
      background: var(--green);
      box-shadow: 0 5px 12px rgba(15, 111, 89, .2);
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 44px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      min-width: 0;
    }

    .field span {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .field select,
    .field input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric label {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 9px;
      font-size: 30px;
      line-height: 1;
      font-weight: 800;
    }

    .metric small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calculator-panel {
      margin-top: 12px;
    }

    .calculator-grid {
      display: grid;
      grid-template-columns: minmax(520px, 1.08fr) minmax(380px, .92fr);
      gap: 12px;
      align-items: stretch;
    }

    .calc-input-column {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .calc-input-column .calc-note {
      margin: 0;
    }

    .calc-form {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-content: start;
    }

    .calc-form .field {
      height: 48px;
    }

    .calc-form .wide {
      grid-column: span 2;
    }

    .check-field {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-size: 13px;
    }

    .check-field input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }

    .calc-result {
      display: grid;
      gap: 10px;
    }

    .score-card {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfb;
    }

    .score-card div {
      min-width: 0;
    }

    .score-card label,
    .bonus-list label {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .score-card strong {
      display: block;
      margin-top: 7px;
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .prediction-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .prediction-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .prediction-head h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .prediction-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .prediction-badges {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 190px;
    }

    .risk-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      color: #fff;
      background: var(--green);
      font-size: 12px;
      white-space: nowrap;
    }

    .risk-pill.watch {
      background: var(--amber);
    }

    .risk-pill.risk {
      background: var(--red);
    }

    .model-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(15, 111, 89, .2);
      color: var(--green);
      background: rgba(15, 111, 89, .08);
      font-size: 12px;
      white-space: nowrap;
    }

    .model-pill.watch {
      border-color: rgba(201, 121, 25, .28);
      color: var(--amber);
      background: rgba(201, 121, 25, .10);
    }

    .model-pill.risk {
      border-color: rgba(183, 72, 62, .28);
      color: var(--red);
      background: rgba(183, 72, 62, .10);
    }

    .predict-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .predict-item {
      padding: 10px;
      border-radius: var(--radius);
      background: #f5f8f5;
      min-width: 0;
    }

    .predict-item label {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .predict-item strong {
      display: block;
      margin-top: 6px;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    .forecast-list {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .forecast-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 38px;
      padding: 8px 10px;
      border-top: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
    }

    .forecast-row:first-child {
      border-top: 0;
    }

    .forecast-row.head {
      min-height: 32px;
      color: var(--muted);
      background: #f5f8f5;
      font-size: 12px;
    }

    .forecast-row strong {
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .forecast-empty {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: #fbfcfb;
      font-size: 12px;
    }

    .prediction-range {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(201, 121, 25, .28);
      border-radius: var(--radius);
      color: #6f4c12;
      background: rgba(201, 121, 25, .08);
      font-size: 12px;
      line-height: 1.5;
    }

    .bonus-list {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfb;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .calc-note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(560px, 1.25fr) minmax(390px, .75fr);
      gap: 12px;
      margin-top: 12px;
      align-items: stretch;
    }

    .layout-column {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    #detailSection {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    #detailSection .panel-body {
      flex: 1;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 54px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f8faf7);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .panel-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 14px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .chart-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfb;
      min-height: 246px;
      overflow: hidden;
    }

    .chart-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .chart-title strong {
      color: var(--ink);
      font-size: 14px;
    }

    svg {
      width: 100%;
      display: block;
    }

    .table-wrap {
      overflow: auto;
      max-height: 760px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      color: var(--muted);
      background: #f5f8f5;
      font-weight: 700;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th,
    td {
      padding: 10px 9px;
      border-bottom: 1px solid #e9eee9;
      vertical-align: middle;
    }

    tr.data-row {
      cursor: pointer;
    }

    tr.data-row:hover {
      background: #f3f8f5;
    }

    tr.data-row.selected {
      background: #e7f3ee;
      box-shadow: inset 3px 0 0 var(--green);
    }

    .school-cell {
      min-width: 0;
    }

    .school-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .school-sub {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.public {
      color: var(--green);
      border-color: rgba(15, 111, 89, .24);
      background: rgba(15, 111, 89, .08);
    }

    .tag.private {
      color: var(--blue);
      border-color: rgba(46, 111, 159, .24);
      background: rgba(46, 111, 159, .08);
    }

    .score {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 17px;
    }

    .delta {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .delta.up {
      color: var(--red);
    }

    .delta.down {
      color: var(--green);
    }

    .delta.flat {
      color: var(--muted);
    }

    .detail-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-title h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .detail-title small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
    }

    .detail-score {
      text-align: right;
      min-width: 86px;
    }

    .detail-score strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .detail-score span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-chart {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfb;
      overflow: hidden;
    }

    .year-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .year-row {
      display: grid;
      grid-template-columns: 60px 78px 1fr;
      gap: 8px;
      align-items: start;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .year-row strong {
      font-variant-numeric: tabular-nums;
    }

    .year-row p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
      word-break: break-word;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
    }

    .tabs button {
      height: 34px;
      border-radius: 4px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
    }

    .tabs button.active {
      color: #fff;
      background: var(--ink);
    }

    .rule-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .rule-item {
      padding: 12px;
      border-left: 3px solid var(--green);
      background: #f7faf7;
      border-radius: 0 var(--radius) var(--radius) 0;
      line-height: 1.65;
      color: #26332e;
      font-size: 13px;
    }

    .score-types {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .score-types td,
    .score-types th {
      position: static;
      padding: 9px;
      font-size: 12px;
      background: #fff;
    }

    .score-types th {
      color: var(--muted);
      background: #f5f8f5;
    }

    .raw-section {
      max-height: 350px;
      overflow: auto;
      margin-top: 12px;
      padding-right: 4px;
    }

    .raw-section article {
      margin-bottom: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      line-height: 1.7;
      color: #34423c;
      font-size: 12px;
    }

    .empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 30px;
    }

    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1180px) {
      .brand h1 {
        font-size: 34px;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .filters .field.search {
        grid-column: 1 / -1;
      }

      .metrics {
        grid-template-columns: repeat(3, 1fr);
      }

      .calculator-grid {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        background:
          linear-gradient(180deg, rgba(15, 111, 89, .08), transparent 220px),
          var(--bg);
      }

      .shell {
        width: 100%;
        padding: 10px 10px 22px;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 2px 0 10px;
      }

      .brand h1 {
        font-size: 25px;
        line-height: 1.12;
      }

      .brand p {
        margin-top: 6px;
        font-size: 13px;
        line-height: 1.5;
      }

      .meta-pill {
        width: 100%;
        min-height: 0;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.45;
        white-space: normal;
      }

      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 8px;
        box-shadow: 0 8px 20px rgba(23, 38, 31, .08);
      }

      .filters .field.search {
        grid-column: 1 / -1;
      }

      .segmented {
        gap: 3px;
        padding: 3px;
      }

      .segmented button,
      .tabs button {
        height: 36px;
        padding: 0 6px;
        font-size: 13px;
      }

      .field {
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 3px;
        height: auto;
        min-height: 56px;
        padding: 7px 9px;
      }

      .field span {
        font-size: 12px;
        line-height: 1.1;
      }

      .field select,
      .field input {
        min-height: 24px;
        font-size: 14px;
      }

      .metrics {
        grid-template-columns: none;
        grid-auto-flow: column;
        grid-auto-columns: minmax(132px, 42vw);
        gap: 8px;
        overflow-x: auto;
        margin: 10px -10px 0;
        padding: 0 10px 4px;
        scroll-snap-type: x proximity;
        scrollbar-width: none;
      }

      .metrics::-webkit-scrollbar {
        display: none;
      }

      .metric {
        min-height: 78px;
        padding: 11px 12px;
        scroll-snap-align: start;
      }

      .metric strong {
        margin-top: 7px;
        font-size: 24px;
      }

      .metric small {
        margin-top: 6px;
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .calculator-panel {
        margin-top: 10px;
      }

      .panel {
        margin-right: -10px;
        margin-left: -10px;
        border-right: 0;
        border-left: 0;
        border-radius: 0;
      }

      .panel-head {
        min-height: 0;
        align-items: flex-start;
        padding: 11px 10px;
      }

      .panel-head h2 {
        font-size: 16px;
      }

      .panel-head p {
        font-size: 12px;
        line-height: 1.45;
      }

      .panel-body {
        padding: 10px;
      }

      .calculator-grid,
      .layout,
      .chart-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .layout {
        margin-top: 10px;
      }

      .calc-form {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .calc-form .wide,
      .check-field {
        grid-column: 1 / -1;
      }

      .check-field {
        min-height: 44px;
        padding: 8px 9px;
        line-height: 1.35;
      }

      .score-card {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
      }

      .score-card strong {

  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>布吉街道义务教育录取分析</h1>
        <p id="subtitle">小一、初一历年录取线与 2026 规则速查</p>

      <div class="meta-pill" id="metaPill">数据加载中</div>
    </header>

    <section class="filters" aria-label="筛选">
      <div class="segmented" id="stageFilter" aria-label="学段"></div>
      <div class="segmented" id="typeFilter" aria-label="办学性质"></div>

    <section class="metrics" id="metrics"></section>

    <section class="panel calculator-panel">
      <div class="panel-head">
        <div>

        </div>
      </div>
      <div class="panel-body">
        <div class="calculator-grid">
          <div class="calc-input-column">
            <div class="calc-form" aria-label="积分试算">
              <label class="field">

                <select id="calcStage"></select>
              </label>
              <label class="field wide">
                <span>目标</span>
                <select id="calcTarget"></select>
              </label>
              <label class="field">
                <span>户籍</span>
                <select id="calcHukou"></select>
              </label>
              <label class="field">
                <span>居住</span>

              <label class="field">

  </main>

  <script>
    const data = window.ADMISSION_DATA;
    const MAX_ADMISSION_SCORE = 110;
    const FORECAST_YEAR_COUNT = 3;
    const TREND_DECAY = 0.8;
    const TREND_MAX_YEARLY_CHANGE = 3;
    const COHORT_DELTA_OUTLIER_THRESHOLD = data.cohort_model?.delta_outlier_threshold || 10;
    const MODEL_SPREAD_RANGE_THRESHOLD = 5;
    const MODEL_SPREAD_RISK_THRESHOLD = 6;
    const admissionTypes = ["录取分数线", "民办直升"];
    const state = {
      stage: "全部",
      type: "全部",
      year: null,
      admissionType: "录取分数线",
      query: "",
      selectedKey: "",
      tab: "趋势",
      calculator: {
        stage: "初一",
        targetId: "",
        hukou: "学区户籍",
        residence: "学区自购商品房",
        propertyDate: "2014-12-24",
        rentDate: "",
        hukouDate: "",
        socialMonths: 0,
        cutoffDate: "2028-04-01",
        priorityArea: false
      }
    };

    const collator = new Intl.Collator("zh-Hans-CN");

    function capScore(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return null;
      return Math.round(Math.min(MAX_ADMISSION_SCORE, Math.max(0, Number(value))) * 100) / 100;
    }

    function roundDelta(value) {
      return Math.round(value * 100) / 100;
    }

    function formatScore(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      return Number(value).toFixed(2).replace(/\.00$/, "").replace(/(\.\d)0$/, "$1");
    }

    function formatDelta(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      if (Math.abs(value) < 0.005) return "持平";
      return `${value > 0 ? "+" : ""}${formatScore(value)}`;
    }

    function deltaClass(value) {
      if (value === null || value === undefined || Number.isNaN(value) || Math.abs(value) < 0.005) return "flat";
      return value > 0 ? "up" : "down";
    }

    function modelDirection(change) {
      if (change === null || change === undefined || Number.isNaN(change) || Math.abs(change) < 0.005) return "flat";
      return change > 0 ? "up" : "down";
    }

    function forecastDirection(change) {
      const direction = modelDirection(change);
      if (direction === "flat") return "预计持平";
      return direction === "up" ? "预计上升" : "预计下降";
    }

    function clampTrendChange(value) {
      return Math.max(-TREND_MAX_YEARLY_CHANGE, Math.min(TREND_MAX_YEARLY_CHANGE, value));
    }

    function weightedRecentChange(changes) {
      if (!changes.length) return null;
      let weighted = 0;
      let totalWeight = 0;
      changes.forEach((change, index) => {
        const distanceFromLatest = changes.length - 1 - index;
        const weight = Math.pow(TREND_DECAY, distanceFromLatest);
        weighted += clampTrendChange(change) * weight;
        totalWeight += weight;
      });
      return totalWeight ? weighted / totalWeight : null;
    }

    function formatForecastSeries(forecasts) {
      if (!forecasts?.length) return "-";
      return forecasts.map(item => `${item.year} ${formatScore(item.score)}`).join("、");
    }

    function forecastPeriodLabel(count) {
      if (count >= FORECAST_YEAR_COUNT) return "未来三年";
      return `未来${count}年`;
    }

    function unique(values) {
      return Array.from(new Set(values));
    }

    function keyOf(record) {
      return [record.stage, record.school_key, record.admission_type].join("|");
    }

    function visibleRecords() {
      const q = state.query.trim().toLowerCase();
      return data.records.filter(record => {
        if (state.stage !== "全部" && record.stage !== state.stage) return false;
        if (state.type !== "全部" && record.school_type !== state.type) return false;
        if (record.admission_type !== state.admissionType) return false;
        if (q && !`${record.school_name} ${record.school_key} ${record.note}`.toLowerCase().includes(q)) return false;
        return true;
      });
    }

    function recordsForTable() {
      const records = visibleRecords().filter(record => state.year === "全部" || record.year === Number(state.year));
      if (state.year !== "全部") {
        return records
          .filter(record => record.score_text)
          .sort((a, b) => {
            const scoreDiff = (b.score_value ?? -1) - (a.score_value ?? -1);
            if (scoreDiff) return scoreDiff;
            return collator.compare(a.school_name, b.school_name);
          });
      }

      const latest = new Map();
      records.forEach(record => {
        const key = keyOf(record);
        const old = latest.get(key);
        if (!old || record.year > old.year) latest.set(key, record);
      });
      return Array.from(latest.values()).sort((a, b) => {
        const scoreDiff = (b.score_value ?? -1) - (a.score_value ?? -1);
        if (scoreDiff) return scoreDiff;
        return collator.compare(a.school_name, b.school_name);
      });
    }

    function historyFor(recordOrKey) {
      const key = typeof recordOrKey === "string" ? recordOrKey : keyOf(recordOrKey);
      const [stage, schoolKey, admissionType] = key.split("|");
      return data.records
        .filter(record => record.stage === stage && record.school_key === schoolKey && record.admission_type === admissionType)
        .sort((a, b) => a.year - b.year);
    }

    function trendFor(record) {
      if (record.score_value === null || record.score_value === undefined) return null;
      const history = historyFor(record).filter(item => item.score_value !== null && item.year <= record.year);
      const index = history.findIndex(item => item.year === record.year && item.source === record.source);
      const currentIndex = index >= 0 ? index : history.findIndex(item => item.year === record.year);
      if (currentIndex <= 0) return null;
      return Math.round((record.score_value - history[currentIndex - 1].score_value) * 100) / 100;
    }

    function average(values) {
      const nums = values.filter(value => value !== null && value !== undefined && !Number.isNaN(value));
      if (!nums.length) return null;
      return nums.reduce((sum, value) => sum + value, 0) / nums.length;
    }

    function calcTargetId(record) {
      return [record.stage, record.school_key, record.school_type, record.admission_type].join("|");
    }

    function parseTargetId(targetId) {
      const [stage, schoolKey, schoolType, admissionType = "录取分数线"] = targetId.split("|");
      return { stage, schoolKey, schoolType, admissionType };
    }

    function recordsForSchool(stage, schoolKey, schoolType, admissionType = "录取分数线") {
      return data.records
        .filter(record =>
          record.stage === stage &&
          record.school_key === schoolKey &&
          record.school_type === schoolType &&
          record.admission_type === admissionType
        )
        .sort((a, b) => a.year - b.year);
    }

    function latestRecordForSchool(stage, schoolKey, schoolType, admissionType = "录取分数线") {
      return recordsForSchool(stage, schoolKey, schoolType, admissionType)
        .filter(record => record.score_value !== null)
        .slice()
        .pop();
    }

    function calcTargetOptions(stage) {
      const latest = new Map();
      data.records
        .filter(record => record.stage === stage)
        .forEach(record => {
          const id = calcTargetId(record);
          const old = latest.get(id);
          if (!old || record.year > old.year) latest.set(id, record);
        });
      return Array.from(latest.values()).sort((a, b) => {
        const typeDiff = a.school_type.localeCompare(b.school_type, "zh-Hans-CN");
        if (typeDiff) return typeDiff;
        const nameDiff = collator.compare(a.school_name, b.school_name);
        if (nameDiff) return nameDiff;
        return collator.compare(a.admission_type, b.admission_type);
      });
    }

    function fullMonthsBetween(startDate, endDate) {
      if (!startDate || !endDate) return 0;
      const start = new Date(`${startDate}T00:00:00`);
      const end = new Date(`${endDate}T00:00:00`);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || start > end) return 0;
      let months = (end.getFullYear() - start.getFullYear()) * 12 + end.getMonth() - start.getMonth();
      if (end.getDate() < start.getDate()) months -= 1;
      return Math.max(0, months);
    }

    function bonusFromDate(label, dateValue, cutoffDate) {
      const months = fullMonthsBetween(dateValue, cutoffDate);
      return {
        label,
        months,
        score: Math.round(months * 0.05 * 100) / 100,
        text: dateValue ? `${label} ${months} 个月，+${formatScore(months * 0.05)}` : `${label}未填写，不计加分`
      };
    }

    function baseCategory(hukou, residence) {
      if (residence === "学区自购商品房") {
        if (hukou === "非深圳户籍") return { category: "第四类", base: 80, text: "非深户籍 + 学区自购商品房" };
        if (hukou === "深圳其他区户籍") return { category: "第二类", base: 95, text: "深圳其他区户籍 + 学区自购商品房" };
        return { category: "第一类", base: 100, text: "龙岗/学区户籍 + 学区自购商品房" };
      }
      if (residence === "学区祖屋") {
        if (hukou === "学区户籍") return { category: "第一类", base: 100, text: "学区户籍 + 学区祖屋" };
        return { category: "需核验", base: null, text: "学区祖屋通常要求学区户籍，请按材料人工核验" };
      }
      if (hukou === "学区户籍") return { category: "第三类", base: 90, text: "学区户籍 + 租房/特殊住房" };
      if (hukou === "龙岗户籍") return { category: "第五类", base: 75, text: "龙岗户籍 + 租房/特殊住房" };
      if (hukou === "深圳其他区户籍") return { category: "第六类", base: 70, text: "深圳其他区户籍 + 租房/特殊住房" };
      return { category: "第七类", base: 60, text: "非深户籍 + 租房/特殊住房" };
    }

    function calculateScore() {
      const calc = state.calculator;
      const category = baseCategory(calc.hukou, calc.residence);
      const details = [];
      let rawBonus = 0;

      if (calc.residence === "学区自购商品房") {
        const item = bonusFromDate("产权", calc.propertyDate, calc.cutoffDate);
        rawBonus += item.score;
        details.push(item.text);
      }

      if (calc.residence === "学区祖屋") {
        const item = bonusFromDate("学区户籍", calc.hukouDate, calc.cutoffDate);
        rawBonus += item.score;
        details.push(item.text);
      }

      if (calc.residence === "学区租房或特殊住房") {
        const rent = bonusFromDate("租赁备案", calc.rentDate, calc.cutoffDate);
        rawBonus += rent.score;
        details.push(rent.text);
        if (calc.hukou === "学区户籍") {
          const hukou = bonusFromDate("学区户籍", calc.hukouDate, calc.cutoffDate);
          rawBonus += hukou.score;
          details.push(hukou.text);
        }
      }

      if (calc.hukou === "非深圳户籍") {
        const months = Math.max(0, Number(calc.socialMonths || 0) - 12);
        const socialBonus = Math.round(months * 0.05 * 100) / 100;
        rawBonus += socialBonus;
        details.push(`社保超过基础 12 个月部分 ${months} 个月，+${formatScore(socialBonus)}`);
      }

      if (calc.stage === "小一" && calc.priorityArea) {
        rawBonus += 2.5;
        details.push("小一优享学区第一志愿 +2.5");
      }

      const cappedBonus = Math.min(10, Math.round(rawBonus * 100) / 100);
      const total = category.base === null ? null : capScore(category.base + cappedBonus);
      if (rawBonus > 10) details.push(`加分原始合计 ${formatScore(rawBonus)}，按规则封顶为 10`);

      return {
        category,
        rawBonus: Math.round(rawBonus * 100) / 100,
        bonus: cappedBonus,
        total,
        details
      };
    }

    function riskByMargin(margin) {
      if (margin === null || margin === undefined || Number.isNaN(margin)) return { text: "无法判断", tone: "watch" };
      if (margin >= 5) return { text: "较稳", tone: "safe" };
      if (margin >= 1) return { text: "有机会", tone: "safe" };
      if (margin >= 0) return { text: "压线", tone: "watch" };
      if (margin >= -3) return { text: "偏紧", tone: "watch" };
      return { text: "风险高", tone: "risk" };
    }

    function forecastItemsFromScores(latestScore, futureScores) {
      const forecasts = [];
      let previousScore = latestScore;
      futureScores.forEach(item => {
        const score = capScore(item.score);
        if (score === null) return;
        forecasts.push({
          year: item.year,
          score,
          change: roundDelta(score - previousScore),
          cumulativeChange: roundDelta(score - latestScore),
          source: item.source || ""
        });
        previousScore = score;
      });
      return forecasts;
    }

    function forecastResult(payload) {
      const forecasts = (payload.forecasts || []).filter(item => item.score !== null && item.score !== undefined);
      if (!forecasts.length) return null;
      const first = forecasts[0];
      return {
        ...payload,
        forecasts,
        predictedYear: first.year,
        predictedScore: first.score,
        change: first.change
      };
    }

    function recentTrendPrediction(stage, schoolKey, schoolType, admissionType = "录取分数线") {
      const history = recordsForSchool(stage, schoolKey, schoolType, admissionType).filter(record => record.score_value !== null);
      if (history.length < 2) return null;
      const recent = history.slice(-4);
      const changes = recent.slice(1).map((record, index) => record.score_value - recent[index].score_value);
      const weightedChange = weightedRecentChange(changes) ?? 0;
      const latest = recent[recent.length - 1];
      const futureScores = [];
      let previousScore = latest.score_value;
      for (let step = 1; step <= FORECAST_YEAR_COUNT; step += 1) {
        const score = capScore(previousScore + weightedChange);
        futureScores.push({
          year: latest.year + step,
          score,
          source: `近年加权变化 ${formatDelta(roundDelta(weightedChange))}`
        });
        previousScore = score;
      }
      const lowConfidence = history.length <= 2;
      const clipped = changes.some(change => Math.abs(change) > TREND_MAX_YEARLY_CHANGE);
      const notes = [
        lowConfidence ? "仅 2 年有效数据，趋势仅供参考" : "",
        clipped ? `年变化超过 ${TREND_MAX_YEARLY_CHANGE} 分时已截尾` : ""
      ].filter(Boolean);
      return forecastResult({
        method: "近年趋势",
        latestYear: latest.year,
        forecasts: forecastItemsFromScores(latest.score_value, futureScores),
        basis: `${recent[0].year}-${latest.year} 同校录取线变化，按 EWMA 加权变化 ${formatDelta(roundDelta(weightedChange))} 逐年延展${notes.length ? `；${notes.join("；")}` : ""}`,
        confidenceNote: notes.join("；")
      });
    }

    function latestCohortPair(schoolKey, schoolType) {
      if (!data.cohort_model) return null;
      const pairs = data.cohort_model.pairs
        .filter(item => item.school_key === schoolKey && item.school_type === schoolType)
        .sort((a, b) => a.junior_year - b.junior_year);
      return pairs[pairs.length - 1] || null;
    }

    function cohortSummary(schoolKey, schoolType) {
      return data.cohort_model?.school_summaries?.[`${schoolKey}|${schoolType}`] || null;
    }

    function cohortPairOutlier(pair) {
      return pair && Math.abs(pair.cohort_delta) > COHORT_DELTA_OUTLIER_THRESHOLD;
    }

    function cohortOutlierMessage(summary, pair) {
      if (summary?.outlier_pair_count) {
        const years = summary.outlier_years?.length ? `（${summary.outlier_years.join("、")}）` : "";
        if (summary.usable_pair_count) {
          return `该校有 ${summary.outlier_pair_count} 届 cohort delta 超过 ${COHORT_DELTA_OUTLIER_THRESHOLD} 分${years}，已从加权 delta 中剔除。`;
        }
        return `该校 cohort delta 均超过 ${COHORT_DELTA_OUTLIER_THRESHOLD} 分保护阈值${years}，已自动使用替代模型预测。`;
      }
      if (!pair) return "";
      return `该校 cohort delta 为 ${formatDelta(pair.cohort_delta)}，超过 ${COHORT_DELTA_OUTLIER_THRESHOLD} 分保护阈值，已自动使用替代模型预测。`;
    }

    function cohortPrediction(stage, schoolKey, schoolType) {
      if (stage !== "初一" || !data.cohort_model) return null;
      const summary = cohortSummary(schoolKey, schoolType);
      const pair = latestCohortPair(schoolKey, schoolType);
      if (!summary || !pair || summary.weighted_delta === null || summary.weighted_delta === undefined) return null;
      const primaryByYear = new Map(
        recordsForSchool("小一", schoolKey, schoolType)
          .filter(record => record.score_value !== null)
          .map(record => [record.year, record])
      );
      const futureScores = [];
      for (let step = 1; step <= FORECAST_YEAR_COUNT; step += 1) {
        const primaryYear = summary.latest_primary_year + step;
        const primary = primaryByYear.get(primaryYear);
        if (!primary) break;
        futureScores.push({
          year: summary.latest_junior_year + step,
          score: primary.score_value + summary.weighted_delta,
          source: `小一${primaryYear} ${formatScore(primary.score_value)}`
        });
      }
      const multiPair = summary.usable_pair_count > 1;
      const method = multiPair ? "小一到初一 cohort 加权" : "小一到初一 cohort";
      const confidence = summary.usable_pair_count > 1
        ? `${summary.usable_pair_count} 届有效 cohort 样本`
        : "仅 1 届有效 cohort 样本";
      const deltaBasis = multiPair
        ? `有效 delta 加权均值 ${formatDelta(summary.weighted_delta)}，样本年 ${summary.years.join("、")}`
        : `cohort delta ${formatDelta(summary.weighted_delta)}`;
      return forecastResult({
        method,
        latestYear: summary.latest_junior_year,
        forecasts: forecastItemsFromScores(summary.latest_junior_score, futureScores),
        basis: `最新映射小一${summary.latest_primary_year} ${formatScore(summary.latest_primary_score)} -> 初一${summary.latest_junior_year} ${formatScore(summary.latest_junior_score)}；${deltaBasis}；${confidence}；${forecastPeriodLabel(futureScores.length)}参考 ${futureScores.map(item => item.source).join("、")}`,
        cohortDelta: summary.weighted_delta,
        confidenceNote: confidence
      });
    }

    function groupedPrimaryCohortPrediction(stage, schoolKey, schoolType, admissionType = "录取分数线") {
      if (stage !== "初一") return null;
      if (admissionType !== "录取分数线") return null;
      const lagYears = data.cohort_model?.lag_years || 6;
      const latest = latestRecordForSchool(stage, schoolKey, schoolType, admissionType);
      if (!latest || latest.score_value === null) return null;
      const primaryYear = latest.year - lagYears;
      const primaryRecords = data.records.filter(record =>
        record.stage === "小一" &&
        record.school_type === schoolType &&
        record.admission_type === "录取分数线" &&
        record.year === primaryYear &&
        record.score_value !== null
      );
      const primaryAvg = average(primaryRecords.map(record => record.score_value));
      if (primaryAvg === null) return null;
      const cohortDelta = latest.score_value - primaryAvg;
      const futureScores = [];
      for (let step = 1; step <= FORECAST_YEAR_COUNT; step += 1) {
        const futurePrimaryYear = primaryYear + step;
        const futurePrimaryRecords = data.records.filter(record =>
          record.stage === "小一" &&
          record.school_type === schoolType &&
          record.admission_type === "录取分数线" &&
          record.year === futurePrimaryYear &&
          record.score_value !== null
        );
        const futurePrimaryAvg = average(futurePrimaryRecords.map(record => record.score_value));
        if (futurePrimaryAvg === null) break;
        futureScores.push({
          year: latest.year + step,
          score: futurePrimaryAvg + cohortDelta,
          source: `布吉${schoolType}小学${futurePrimaryYear}均线 ${formatScore(futurePrimaryAvg)}`
        });
      }
      return forecastResult({
        method: `${schoolType}小学整体 cohort`,
        latestYear: latest.year,
        forecasts: forecastItemsFromScores(latest.score_value, futureScores),
        basis: `${schoolType}初中${latest.year}线 ${formatScore(latest.score_value)} - 布吉${schoolType}小学${primaryYear}均线 ${formatScore(primaryAvg)}；${forecastPeriodLabel(futureScores.length)}参考 ${futureScores.map(item => item.source).join("、")}`,
        cohortDelta: Math.round(cohortDelta * 100) / 100
      });
    }

    function firstForecastsForModels(models) {
      return models
        .filter(model => model?.forecasts?.length)
        .map(model => ({ method: model.method, forecast: model.forecasts[0] }));
    }

    function modelAgreement(models) {
      const usable = models.filter(Boolean);
      if (!usable.length) {
        return { text: "无模型", tone: "watch", detail: "暂无可用预测模型" };
      }
      if (usable.length < 2) {
        return { text: "单模型", tone: "watch", detail: "仅有一个预测模型可用" };
      }
      const firstForecasts = firstForecastsForModels(usable);
      if (firstForecasts.length >= 2) {
        const scores = firstForecasts.map(item => item.forecast.score);
        const spread = roundDelta(Math.max(...scores) - Math.min(...scores));
        if (spread >= MODEL_SPREAD_RISK_THRESHOLD) {
          const year = firstForecasts[0].forecast.year;
          return {
            text: "分歧大",
            tone: "risk",
            detail: `${year} 年各模型首年预测差距 ${formatScore(spread)} 分，超过 ${MODEL_SPREAD_RISK_THRESHOLD} 分阈值`
          };
        }
      }
      const directions = usable.map(model => modelDirection(model.change));
      const counts = directions.reduce((map, direction) => {
        map[direction] = (map[direction] || 0) + 1;
        return map;
      }, {});
      const uniqueDirections = Object.keys(counts);
      const maxCount = Math.max(...Object.values(counts));
      if (uniqueDirections.length === 1) {
        return { text: "一致", tone: "safe", detail: `${usable.length} 个模型方向一致` };
      }
      if (maxCount >= 2) {
        return { text: "有分歧", tone: "watch", detail: `${maxCount}/${usable.length} 个模型方向一致，需结合辅助参考` };
      }
      return { text: "分歧大", tone: "risk", detail: "模型方向分散，建议保守填报" };
    }

    function predictionRange(models) {
      const firstForecasts = firstForecastsForModels(models);
      if (firstForecasts.length < 2) return null;
      const scores = firstForecasts.map(item => item.forecast.score);
      const minScore = Math.min(...scores);
      const maxScore = Math.max(...scores);
      const spread = roundDelta(maxScore - minScore);
      const year = firstForecasts[0].forecast.year;
      return {
        year,
        minScore,
        maxScore,
        spread,
        items: firstForecasts
      };
    }

    function formatModelFirstForecast(model) {
      if (!model?.forecasts?.length) return "";
      const first = model.forecasts[0];
      return `${model.method}：${first.year} ${formatScore(first.score)}（${formatDelta(first.change)}）`;
    }

    function predictionForTarget() {
      if (!state.calculator.targetId) return null;
      const target = parseTargetId(state.calculator.targetId);
      const latest = latestRecordForSchool(target.stage, target.schoolKey, target.schoolType, target.admissionType);
      const pair = target.stage === "初一" && target.admissionType === "录取分数线" ? latestCohortPair(target.schoolKey, target.schoolType) : null;
      const summary = target.stage === "初一" && target.admissionType === "录取分数线" ? cohortSummary(target.schoolKey, target.schoolType) : null;
      const warnings = summary?.outlier_pair_count || (pair && cohortPairOutlier(pair)) ? [cohortOutlierMessage(summary, pair)] : [];
      const direct = target.stage === "初一" && target.admissionType === "录取分数线" ? cohortPrediction(target.stage, target.schoolKey, target.schoolType) : null;
      const grouped = target.stage === "初一" ? groupedPrimaryCohortPrediction(target.stage, target.schoolKey, target.schoolType, target.admissionType) : null;
      const trend = recentTrendPrediction(target.stage, target.schoolKey, target.schoolType, target.admissionType);
      const candidates = target.stage === "初一" && target.admissionType === "录取分数线"
        ? [direct, grouped, trend].filter(Boolean)
        : [trend].filter(Boolean);
      const forecast = candidates[0] || null;
      const auxiliary = candidates.find(model => model !== forecast) || null;
      const agreement = modelAgreement(candidates);
      const range = predictionRange(candidates);
      const showRange = range && (agreement.tone === "risk" || range.spread >= MODEL_SPREAD_RANGE_THRESHOLD);
      return { target, latest, forecast, auxiliary, models: candidates, agreement, range, showRange, warnings };
    }

    function renderMetrics(rows) {
      const numeric = rows.filter(row => row.score_value !== null);
      const avg = average(numeric.map(row => row.score_value));
      const max = numeric.slice().sort((a, b) => b.score_value - a.score_value)[0];

      const risingCount = rows.filter(row => (trendFor(row) ?? 0) > 0).length;
      const publicCount = unique(rows.filter(row => row.school_type === "公办").map(row => keyOf(row))).length;

      const metrics = [
        { label: "学校数量", value: unique(rows.map(row => keyOf(row))).length, sub: `${publicCount} 个公办记录` },
        { label: "平均录取线", value: formatScore(avg), sub: `${state.year} ${state.admissionType}` },
        { label: "最高录取线", value: formatScore(max?.score_value), sub: max ? max.school_name : "-" },
        { label: "最低录取线", value: formatScore(min?.score_value), sub: min ? min.school_name : "-" },
        { label: "较上年上升", value: risingCount, sub: "按同校同类型对比" }
      ];

      document.getElementById("metrics").innerHTML = metrics.map(item => `

          <strong>${item.value}</strong>
          <small title="${item.sub}">${item.sub}</small>
        </article>
      `).join("");
    }

    function setSelectOptions(select, options, value) {
      select.innerHTML = options.map(item => {
        const optionValue = typeof item === "string" ? item : item.value;
        const label = typeof item === "string" ? item : item.label;
        return `<option value="${optionValue}">${label}</option>`;
      }).join("");
      select.value = value;
    }

    function bindCalculatorInput(id, key, transform = value => value) {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.type === "checkbox") {
        el.checked = Boolean(state.calculator[key]);
        el.onchange = event => {
          state.calculator[key] = event.target.checked;
          renderCalculator();
        };
        return;
      }
      el.value = state.calculator[key] ?? "";
      el.oninput = event => {
        state.calculator[key] = transform(event.target.value);
        renderCalculator();
      };
      el.onchange = event => {
        state.calculator[key] = transform(event.target.value);
        renderCalculator();
      };
    }

      document.getElementById("calcResidence").onchange = event => {
        calc.residence = event.target.value;
        renderCalculator();

      bindCalculatorInput("calcSocialMonths", "socialMonths", value => Math.max(0, Number(value || 0)));
      bindCalculatorInput("calcPropertyDate", "propertyDate");
      bindCalculatorInput("calcRentDate", "rentDate");
      bindCalculatorInput("calcHukouDate", "hukouDate");
      bindCalculatorInput("calcCutoffDate", "cutoffDate");
      bindCalculatorInput("calcPriorityArea", "priorityArea");

    function renderCalculatorResult() {
      const result = calculateScore();
      const prediction = predictionForTarget();

      const forecast = prediction?.forecast;
      const auxiliary = prediction?.auxiliary;
      const agreement = prediction?.agreement || { text: "单模型", tone: "watch", detail: "仅有一个预测模型可用" };
      const models = prediction?.models || [];
      const range = prediction?.range;
      const showRange = prediction?.showRange;
      const warnings = prediction?.warnings || [];
      const forecasts = forecast?.forecasts || [];
      const firstForecast = forecasts[0];
      const lastForecast = forecasts[forecasts.length - 1];
      const marginLatest = latest && result.total !== null ? roundDelta(result.total - latest.score_value) : null;
      const marginForecast = firstForecast && result.total !== null ? roundDelta(result.total - firstForecast.score) : null;
      const risk = riskByMargin(marginForecast ?? marginLatest);
      const trendChange = lastForecast ? lastForecast.cumulativeChange : null;
      const direction = lastForecast ? forecastDirection(trendChange) : "暂无预测";
      const directionClass = lastForecast ? deltaClass(trendChange) : "flat";
      const targetName = latest?.school_name || "请选择目标学校";
      const agreementClass = agreement.tone === "risk" ? "risk" : agreement.tone === "watch" ? "watch" : "";
      const rangeLabel = showRange && range

              <span class="risk-pill ${risk.tone === "risk" ? "risk" : risk.tone === "watch" ? "watch" : ""}">${risk.text}</span>

          <div class="predict-grid">

            </div>

    function scalePoint(value, minValue, maxValue, start, end) {
      if (maxValue === minValue) return (start + end) / 2;
      return start + ((value - minValue) / (maxValue - minValue)) * (end - start);
    }

    function renderAverageChart() {
      const records = visibleRecords().filter(record => record.score_value !== null);
      const years = data.meta.years;
      const points = years.map(year => {
        const yearRecords = records.filter(record => record.year === year);
        return { year, value: average(yearRecords.map(record => record.score_value)), count: yearRecords.length };
      }).filter(point => point.value !== null);

      const host = document.getElementById("avgChart");
      document.getElementById("avgChartLabel").textContent = points.length ? `${points[0].year}-${points[points.length - 1].year}` : "";
      if (!points.length) {
        host.innerHTML = `<div class="empty">暂无数据</div>`;
        return;
      }

      const width = 520;
      const height = 204;
      const pad = { top: 24, right: 22, bottom: 34, left: 42 };
      const values = points.map(point => point.value);
      const min = Math.floor(Math.min(...values) - 2);
      const max = Math.ceil(Math.max(...values) + 2);
      const x = year => scalePoint(year, years[0], years[years.length - 1], pad.left, width - pad.right);
      const y = value => height - pad.bottom - scalePoint(value, min, max, 0, height - pad.top - pad.bottom);
      const line = points.map(point => `${x(point.year)},${y(point.value)}`).join(" ");
      const area = `${pad.left},${height - pad.bottom} ${line} ${x(points[points.length - 1].year)},${height - pad.bottom}`;

      host.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="均分走势">
          <path d="M ${pad.left} ${pad.top} V ${height - pad.bottom} H ${width - pad.right}" fill="none" stroke="#d7dfd8"/>
          <polygon points="${area}" fill="rgba(15,111,89,.10)"></polygon>
          <polyline points="${line}" fill="none" stroke="#0f6f59" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
          ${years.map(year => `<text x="${x(year)}" y="${height - 12}" text-anchor="middle" fill="#61716a" font-size="11">${year}</text>`).join("")}
          <text x="8" y="${y(max)}" fill="#61716a" font-size="11">${formatScore(max)}</text>
          <text x="8" y="${y(min)}" fill="#61716a" font-size="11">${formatScore(min)}</text>
          ${points.map(point => `
            <g>
              <circle cx="${x(point.year)}" cy="${y(point.value)}" r="4.5" fill="#fff" stroke="#0f6f59" stroke-width="2"></circle>
              <text x="${x(point.year)}" y="${y(point.value) - 10}" text-anchor="middle" fill="#16221d" font-size="11">${formatScore(point.value)}</text>
            </g>
          `).join("")}
        </svg>
      `;
    }

    function renderRankChart(rows) {
      const host = document.getElementById("rankChart");
      const label = state.year === "全部" ? "最新年份" : state.year;
      document.getElementById("rankChartLabel").textContent = label;
      const top = rows
        .filter(row => row.score_value !== null)
        .slice()
        .sort((a, b) => b.score_value - a.score_value)
        .slice(0, 8);

      if (!top.length) {
        host.innerHTML = `<div class="empty">暂无数据</div>`;
        return;
      }

      const width = 560;
      const rowHeight = 23;
      const height = 42 + top.length * rowHeight;
      const max = Math.max(...top.map(row => row.score_value));
      const barX = 254;
      const scoreX = width - 12;
      const maxBarWidth = scoreX - barX - 48;
      host.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="年度排行">
          ${top.map((row, index) => {
            const y = 22 + index * rowHeight;
            const barWidth = Math.max(8, (row.score_value / max) * maxBarWidth);
            const color = row.school_type === "公办" ? "#0f6f59" : "#2e6f9f";
            const name = row.school_name.replace(/（.*?）/g, "").replace(/\(.*?\)/g, "");
            return `
              <text x="12" y="${y + 12}" fill="#16221d" font-size="12">${name.slice(0, 20)}</text>
              <rect x="${barX}" y="${y}" width="${barWidth}" height="14" rx="3" fill="${color}" opacity=".88"></rect>
              <text x="${scoreX}" y="${y + 12}" text-anchor="end" fill="#16221d" font-size="12">${formatScore(row.score_value)}</text>
            `;
          }).join("")}
        </svg>
      `;
    }

    function renderTable(rows) {
      const body = document.getElementById("schoolTable");
      document.getElementById("tableCaption").textContent = `${rows.length} 条记录`;

      if (!state.selectedKey && rows.length) {
        state.selectedKey = keyOf(rows[0]);
      }

      body.innerHTML = rows.map(row => {
        const trend = trendFor(row);
        const note = row.note || row.score_text;
        const selected = keyOf(row) === state.selectedKey ? "selected" : "";
        const typeClass = row.school_type === "公办" ? "public" : "private";
        return `
          <tr class="data-row ${selected}" data-key="${keyOf(row)}">
            <td class="school-cell" data-label="学校">
              <span class="school-name" title="${row.school_name}">${row.school_name}</span>
              <span class="school-sub"><span class="tag ${typeClass}">${row.school_type}</span><span>${row.stage}</span><span>${row.admission_type}</span></span>
            </td>
            <td data-label="年份">${row.year}</td>
            <td data-label="分数"><span class="score">${formatScore(row.score_value)}</span></td>
            <td data-label="变化"><span class="delta ${deltaClass(trend)}">${formatDelta(trend)}</span></td>
            <td data-label="备注" title="${note}">${note || "-"}</td>
          </tr>
        `;
      }).join("");

      body.querySelectorAll("tr.data-row").forEach(row => {
        row.addEventListener("click", () => {
          state.selectedKey = row.dataset.key;
          state.tab = "趋势";
          render();
          if (window.matchMedia("(max-width: 760px)").matches) {
            document.getElementById("detailSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      });

      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="5"><div class="empty">暂无匹配记录</div></td></tr>`;
      }
    }

    function renderDetailTabs() {
      renderButtons("detailTabs", ["趋势", "规则", "原文"], state.tab, value => {
        state.tab = value;
        renderDetail();
      });
    }

    function renderDetail() {
      renderDetailTabs();
      const panel = document.getElementById("detailPanel");
      const history = state.selectedKey ? historyFor(state.selectedKey) : [];
      const current = history.slice().reverse().find(record => record.score_value !== null) || history[history.length - 1];
      document.getElementById("detailCaption").textContent = current ? `${current.stage} · ${current.admission_type}` : "";

      if (state.tab === "规则") {
        const stage = current?.stage || (state.stage === "全部" ? "小一" : state.stage);
        const stageRules = stage === "初一" ? data.rules.junior : data.rules.primary;
        panel.innerHTML = `
          <div class="rule-list">
            ${data.rules.common.concat(stageRules).map(item => `<div class="rule-item">${item}</div>`).join("")}
          </div>
          <div class="score-types">
            <table>
              <thead><tr><th>类型</th><th>基础分</th><th>户籍</th><th>居住</th></tr></thead>
              <tbody>
                ${data.rules.score_types.map(item => `
                  <tr><td>${item.type}</td><td>${item.base}</td><td>${item.hukou}</td><td>${item.residence}</td></tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
        return;
      }

      if (state.tab === "原文") {
        const stage = current?.stage || (state.stage === "全部" ? "小一" : state.stage);
        const sections = data.rule_sections[stage] || [];
        panel.innerHTML = `
          <div class="raw-section">
            ${sections.length ? sections.map(section => `
              <article><strong>${stage}规则 PDF 第 ${section.page} 页</strong><br>${section.text}</article>
            `).join("") : `<div class="empty">暂无布吉相关原文片段</div>`}
          </div>
        `;
        return;
      }

      if (!current) {
        panel.innerHTML = `<div class="empty">请选择学校</div>`;
        return;
      }

      const numeric = history.filter(row => row.score_value !== null);
      const trend = numeric.length > 1 ? numeric[numeric.length - 1].score_value - numeric[0].score_value : null;

      panel.innerHTML = `
        <div class="detail-title">
          <div>
            <h3>${current.school_name}</h3>
            <small>${current.school_type} · ${current.region} · ${current.admission_type}</small>
          </div>
          <div class="detail-score">
            <strong>${formatScore(current.score_value)}</strong>
            <span>${current.year} 年</span>
          </div>
        </div>
        <div class="detail-chart">${renderSchoolSvg(numeric)}</div>
        <div class="year-list">
          ${history.slice().reverse().map(row => `
            <div class="year-row">
              <strong>${row.year}</strong>
              <span class="score">${formatScore(row.score_value)}</span>
              <p>${row.note || row.score_text}<br>来源：${row.source} 第 ${row.source_row} 行</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderSchoolSvg(points) {
      if (!points.length) return `<div class="empty">暂无可绘制分数</div>`;
      const width = 520;
      const height = 210;
      const pad = { top: 24, right: 24, bottom: 34, left: 42 };
      const years = points.map(point => point.year);
      const values = points.map(point => point.score_value);
      const minYear = Math.min(...years);
      const maxYear = Math.max(...years);
      const min = Math.floor(Math.min(...values) - 2);
      const max = Math.ceil(Math.max(...values) + 2);
      const x = year => scalePoint(year, minYear, maxYear, pad.left, width - pad.right);
      const y = value => height - pad.bottom - scalePoint(value, min, max, 0, height - pad.top - pad.bottom);
      const line = points.map(point => `${x(point.year)},${y(point.score_value)}`).join(" ");
      const color = points[points.length - 1].school_type === "公办" ? "#0f6f59" : "#2e6f9f";
      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="学校历年趋势">
          <path d="M ${pad.left} ${pad.top} V ${height - pad.bottom} H ${width - pad.right}" fill="none" stroke="#d7dfd8"/>
          <polyline points="${line}" fill="none" stroke="${color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
          ${points.map(point => `
            <g>
              <circle cx="${x(point.year)}" cy="${y(point.score_value)}" r="5" fill="#fff" stroke="${color}" stroke-width="2"></circle>
              <text x="${x(point.year)}" y="${y(point.score_value) - 10}" text-anchor="middle" fill="#16221d" font-size="11">${formatScore(point.score_value)}</text>
              <text x="${x(point.year)}" y="${height - 12}" text-anchor="middle" fill="#61716a" font-size="11">${point.year}</text>
            </g>
          `).join("")}
        </svg>
      `;
    }

    function render() {
      renderFilters();
      const rows = recordsForTable();
      renderMetrics(rows);
      renderCalculator();
      renderAverageChart();
      renderRankChart(rows);
      renderTable(rows);
      renderDetail();
      document.getElementById("overviewCaption").textContent = `${state.stage} · ${state.type} · ${state.admissionType}`;
    }

    function init() {
      if (!data) {
        document.body.innerHTML = "<main class='shell'><div class='empty'>数据文件未加载</div></main>";
        return;
      }
      state.year = String(Math.max(...data.meta.years));
      document.getElementById("metaPill").textContent = `${data.meta.record_count} 条记录 · ${data.meta.school_count} 个学校组合 · ${data.meta.years[0]}-${data.meta.years[data.meta.years.length - 1]}`;
      const backtest = data.backtest;
      const backtestText = backtest?.overall?.sample_count
        ? `；${backtest.method} MAE ${formatScore(backtest.overall.mae)}（${backtest.overall.sample_count} 个样本）`
        : "";
      document.getElementById("footerNote").textContent = `生成时间：${data.meta.generated_at}；数据来源：${data.meta.source_files.join("、")}${backtestText}`;
      render();
    }

    init();
  </script>
</body>
</html>
